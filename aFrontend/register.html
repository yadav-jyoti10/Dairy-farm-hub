<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dairy Farm Hub | Register</title>
    <link rel="stylesheet" href="./CSS/register.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">

        <h1>Dairy Farm Hub</h1>
        <p class="subtitle">Create your farm account</p>

        <form id="registerForm">

            <label>Farm Owner Name</label>
            <input type="text" id="name" placeholder="Enter full name">
            <small class="error" id="nameError"></small>

            <label>Email</label>
            <input type="email" id="email" placeholder="Enter email">
            <small class="error" id="emailError"></small>

            <label>Mobile Number</label>
            <input type="text" id="mobile" placeholder="Enter mobile number">
            <small class="error" id="mobileError"></small>

            <label>Password</label>
            <div class="password-box">
                <input type="password" id="password" placeholder="Minimum 8 characters">
                <span class="eye" onclick="togglePassword('password', this)">👁</span>
            </div>
            <small class="error" id="passwordError"></small>

            <label>Confirm Password</label>
            <div class="password-box">
                <input type="password" id="confirmPassword" placeholder="Re-enter password">
              <span class="eye" onclick="togglePassword('confirmPassword', this)">👁</span>

            </div>
            <small class="error" id="confirmError"></small>

            <button type="submit">Register</button>

            <p class="switch-text">
                Already have an account? <a href="login.html">Login</a>
            </p>

        </form>
        <!-- Success Popup -->
<div id="successPopup" class="popup">
  <div class="popup-box">
    <h3>Registration Successful 🎉</h3>
    <p>Your User ID:</p>
    <h2 id="showUserId"></h2>
    <button id="okBtn">OK</button>
  </div>
</div>


    </div>
</div>

<script src="./JS/register.js"></script>
</body>
</html>
