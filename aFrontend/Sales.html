<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sales | Dairy Farm Hub</title>
    <link rel="stylesheet" href="./CSS/sidebar.css" />
    <link rel="stylesheet" href="./CSS/Sales.css" />
  </head>

  <body>
    <div class="sidebar">
      <h2>Dairy Farm Hub</h2>
      <a href="dashboard.html">Dashboard</a>
      <a href="Animal.html">Animals</a>
      <a href="Milk.html">Milk Records</a>
      <a href="Feed.html">Feed</a>
      <a class="active" href="Sales.html">Sales</a>
      <button class="logout">Logout</button>
    </div>

    <div class="main">
      <div class="topbar">
        <h1>Sales Manage</h1>
        <div class="user-right" id="topUser"></div>
      </div>

      <div class="content">
        <!-- LEFT TABLE -->
        <div class="card">
          <h3>Sales Records</h3>

          <table>
            <thead>
              <tr>
                <th>Animal ID</th>
                <th>Date</th>
                <th>Time</th>
                <th>Animal</th>
                <th>Milk Type</th>
                <th>Qty (L)</th>
                <th>Rate</th>
                <th>Total</th>
              </tr>
            </thead>

            <tbody id="salesTableBody"></tbody>
          </table>
        </div>

        <!-- RIGHT FORM -->
        <div class="card">
          <h3>Add / Update Sale</h3>

          <label>Date</label>
          <input type="date" id="saleDate" />

          <!-- ✅ NEW: time (HH:MM like 20:19) -->
          <label>Time</label>
          <input type="time" id="saleTime" step="60" />

          <!-- ✅ NEW: Animal dropdown (no typing) -->
          <label>Animal</label>
          <select id="saleAnimalId">
            <option value="">Select Animal</option>
          </select>

          <label>Milk Type</label>
          <select id="saleMilkType">
            <option>Cow</option>
            <option>Buffalo</option>
          </select>

          <label>Quantity (Liters)</label>
          <input type="number" id="saleQty" />

          <label>Rate (₹)</label>
          <input type="number" id="saleRate" />

          <div class="btn-group">
            <button class="add" id="btnSaleAdd">Add</button>
            <button class="update" id="btnSaleUpdate">Update</button>
            <button class="delete" id="btnSaleDelete">Delete</button>

            <!-- ✅ NEW: Clear button -->
            <button class="delete" style="background:#334155;" id="btnSaleClear">Clear</button>
          </div>
        </div>
      </div>
    </div>

    <script src="./JS/Sales.js"></script>
    <script src="./JS/auth.js"></script>
  </body>
</html>
